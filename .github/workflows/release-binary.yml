name: Release Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build binaries for (e.g. v0.1.1)"
        required: true

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: macos-arm64
          - os: macos-13
            arch: macos-x86_64
          - os: ubuntu-22.04
            arch: linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build frontend
        run: |
          cd ui
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies and PyInstaller
        run: |
          pip install uv
          uv venv
          uv pip install -e "." pyinstaller

      - name: Build binary
        run: .venv/bin/pyinstaller contextspy.spec

      - name: Package and checksum
        run: |
          cd dist
          tar czf contextspy-${{ matrix.arch }}.tar.gz contextspy
          shasum -a 256 contextspy-${{ matrix.arch }}.tar.gz > contextspy-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/contextspy-${{ matrix.arch }}.tar.gz
            dist/contextspy-${{ matrix.arch }}.tar.gz.sha256

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    # Requires secret HOMEBREW_TAP_PAT: a fine-grained PAT with Contents read+write
    # on the rimantas/homebrew-contextspy repo.

    steps:
      - uses: actions/checkout@v4

      - name: Download sha256 files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.tag || github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sha256" \
            --dir /tmp/sums

      - name: Clone tap repo
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/RimantasZ/homebrew-contextspy.git" \
            tap

      - name: Patch formula version and sha256 values
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          python3 .github/scripts/update-formula.py \
            "${TAG#v}" \
            "$(awk '{print $1}' /tmp/sums/contextspy-macos-arm64.tar.gz.sha256)" \
            "$(awk '{print $1}' /tmp/sums/contextspy-macos-x86_64.tar.gz.sha256)" \
            "$(awk '{print $1}' /tmp/sums/contextspy-linux-x86_64.tar.gz.sha256)"

      - name: Commit and push formula update
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/contextspy.rb
          git diff --staged --quiet || git commit -m "contextspy ${TAG#v}" && git push
